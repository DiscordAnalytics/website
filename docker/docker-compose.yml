services:
  app:
    image: ghcr.io/discordanalytics/website@sha256:bd522f6d320f54d1bfa336d88c8b70fc9cfdeda3245f4bd73fea6f404e5db09c
    ports:
      - '80:80'
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:80']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    # Uncomment if you need to customize the website configuration (not required)
    #    volumes:
    #      - ./config.js:/app/dist/public/config.js:ro
    restart: unless-stopped

  db:
    image: mongo:8@sha256:7abfba0d07c9330373f8173981ea4d09cd8a82cdf0e86ccaf7008848d1d24f62
    volumes:
      - discord-analytics-database:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: example
    healthcheck:
      test: mongosh --username root --password example --authenticationDatabase admin --eval "db.adminCommand('ping')" localhost:27017/admin --quiet
      interval: 10s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  api:
    image: ghcr.io/discordanalytics/api@sha256:dd51a64d6c8a813fda39f94d5fe14c5c9a66cfd3ce6289b2c423ca304904b9b0
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:3001/heatlh']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped
